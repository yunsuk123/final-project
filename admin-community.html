<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>커뮤니티 관리 | Study Spot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #222;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .admin-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 270px;
      background: #1f2430;
      color: #fff;
      padding: 30px 20px;
    }

    .sidebar h1 {
      font-size: 30px;
      color: #6f86ff;
      margin-bottom: 24px;
    }

    .admin-badge {
      background: rgba(255, 255, 255, 0.08);
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 14px;
      line-height: 1.6;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu a {
      display: block;
      width: 100%;
    }

    .menu button {
      width: 100%;
      border: none;
      background: #2b3142;
      color: #fff;
      padding: 15px 16px;
      border-radius: 12px;
      text-align: left;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .menu button:hover {
      background: #3a4258;
    }

    .menu button.active {
      background: #4a6cf7;
    }

    .content {
      flex: 1;
      padding: 32px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .topbar h2 {
      font-size: 34px;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .top-actions a,
    .top-actions button {
      border: none;
      background: #4a6cf7;
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .top-actions .secondary {
      background: #e9edff;
      color: #4a6cf7;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }

    .card {
      background: #fff;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    .card h3 {
      font-size: 15px;
      color: #666;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 30px;
      font-weight: 800;
      color: #4a6cf7;
    }

    .panel {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      margin-bottom: 22px;
    }

    .panel h3 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .panel p {
      color: #666;
      margin-bottom: 18px;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid #eef1f5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      min-width: 1000px;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #eef1f5;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: #f7f9ff;
      font-weight: 800;
      color: #444;
    }

    td {
      color: #555;
    }

    .post-title {
      font-weight: 700;
      color: #222;
      margin-bottom: 6px;
    }

    .post-content {
      color: #666;
      font-size: 13px;
      line-height: 1.5;
      max-width: 320px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .category-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #eef2ff;
      color: #4a6cf7;
    }

    .category-study {
      background: #ede9fe;
      color: #7c3aed;
    }

    .category-review {
      background: #fff7ed;
      color: #f97316;
    }

    .category-notice {
      background: #fee2e2;
      color: #dc2626;
    }

    .status-open {
      color: #16a34a;
      font-weight: 700;
    }

    .status-closed {
      color: #ef4444;
      font-weight: 700;
    }

    .delete-btn {
      border: none;
      background: #ff4d4f;
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .delete-btn:hover {
      background: #e53935;
    }

    .empty-message {
      text-align: center;
      color: #777;
      padding: 24px 0;
    }

    @media (max-width: 900px) {
      .admin-layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .content {
        padding: 20px;
      }

      .topbar h2 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <h1>Study Spot</h1>

      <div class="admin-badge">
        관리자 계정으로 로그인됨<br>
        아이디: <strong>admin</strong>
      </div>

      <div class="menu">
        <a href="admin.html"><button type="button">관리자 홈</button></a>
        <a href="admin-users.html"><button type="button">회원 관리</button></a>
        <a href="admin-seats.html"><button type="button">좌석 관리</button></a>
        <a href="admin-reserve.html"><button type="button">예약 관리</button></a>
        <a href="admin-pay.html"><button type="button">결제 관리</button></a>
        <a href="admin-community.html"><button type="button" class="active">커뮤니티 관리</button></a>
        <a href="admin-study.html"><button type="button">스터디 그룹 관리</button></a>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <h2>커뮤니티 관리</h2>
        <div class="top-actions">
          <a href="admin.html" class="secondary">관리자 홈</a>
          <button id="adminLogoutBtn" type="button">로그아웃</button>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="card">
          <h3>전체 게시글 수</h3>
          <p id="totalPosts">불러오는 중...</p>
        </div>
        <div class="card">
          <h3>모집중 스터디 수</h3>
          <p id="openStudyPosts">불러오는 중...</p>
        </div>
        <div class="card">
          <h3>오늘 작성 글 수</h3>
          <p id="todayPosts">불러오는 중...</p>
        </div>
      </div>

      <div class="panel">
        <h3>최근 게시글 목록</h3>
        <p>사용자 커뮤니티에 작성된 posts 컬렉션 기준으로 표시됩니다.</p>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>카테고리</th>
                <th>제목 / 내용</th>
                <th>작성자</th>
                <th>작성일</th>
                <th>상태</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="postTableBody">
              <tr>
                <td colspan="6">불러오는 중...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="admin-community.js"></script>
</body>
</html>
