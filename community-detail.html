<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 상세보기 | Study Spot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f5f7ff 0%, #f7f8fc 100%);
      color: #222;
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    textarea {
      font-family: inherit;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #4a6cf7;
    }

    .nav-menu {
      display: flex;
      gap: 20px;
      align-items: center;
      list-style: none;
      flex-wrap: wrap;
    }

    .nav-menu a:hover {
      color: #4a6cf7;
    }

    .nav-btn {
      background: #4a6cf7;
      color: #fff !important;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 700;
      transition: 0.2s;
    }

    .nav-btn:hover {
      background: #3655d6;
    }

    #userName {
      font-weight: 700;
      color: #4a6cf7;
      white-space: nowrap;
    }

    .detail-section {
      padding: 50px 0 90px;
    }

    .detail-card {
      background: #fff;
      border-radius: 28px;
      padding: 38px;
      box-shadow: 0 16px 40px rgba(74, 108, 247, 0.08);
      border: 1px solid #eef1ff;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-right: 8px;
      margin-bottom: 12px;
    }

    .tag.free {
      background: #eef2ff;
      color: #4a6cf7;
    }

    .tag.study {
      background: #eafaf0;
      color: #1a9a55;
    }

    .tag.review {
      background: #fff4e7;
      color: #e8911f;
    }

    .tag.notice {
      background: #ffeaea;
      color: #e64d4d;
    }

    .status-open {
      background: #eafaf0;
      color: #1a9a55;
    }

    .status-close {
      background: #f0f0f0;
      color: #777;
    }

    .detail-title {
      font-size: 42px;
      font-weight: 800;
      margin: 10px 0 18px;
      line-height: 1.25;
      color: #182033;
    }

    .meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      color: #6d7485;
      font-size: 15px;
      margin-bottom: 26px;
    }

    .detail-content {
      font-size: 17px;
      color: #333;
      white-space: pre-wrap;
      margin-bottom: 28px;
      line-height: 1.8;
    }

    .study-box {
      background: linear-gradient(180deg, #f8faff 0%, #f5f8ff 100%);
      border-radius: 22px;
      padding: 24px;
      margin-bottom: 26px;
      border: 1px solid #e8eeff;
    }

    .study-box h3 {
      font-size: 18px;
      margin-bottom: 14px;
      color: #1c2540;
    }

    .study-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
      margin-top: 10px;
    }

    .study-item {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid #edf1ff;
      box-shadow: 0 4px 12px rgba(74, 108, 247, 0.04);
    }

    .study-item h4 {
      font-size: 13px;
      color: #7a8194;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .study-item p {
      font-size: 21px;
      font-weight: 800;
      color: #1f2430;
    }

    .button-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
      margin-bottom: 34px;
    }

    .sub-btn,
    .danger-btn,
    .primary-btn {
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      transition: 0.2s;
    }

    .sub-btn {
      background: #eef2ff;
      color: #4a6cf7;
    }

    .sub-btn:hover {
      background: #dfe7ff;
    }

    .primary-btn {
      background: #4a6cf7;
      color: #fff;
    }

    .primary-btn:hover {
      background: #3655d6;
    }

    .danger-btn {
      background: #ffeaea;
      color: #d63b3b;
    }

    .danger-btn:hover {
      background: #ffdede;
    }

    .comment-section {
      margin-top: 8px;
      padding-top: 28px;
      border-top: 1px solid #eef1f6;
    }

    .comment-section h3 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 18px;
      color: #1b2238;
    }

    .comment-write-box {
      background: #f8faff;
      border: 1px solid #e5ebff;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 22px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    #commentInput {
      width: 100%;
      min-height: 110px;
      border: 1px solid #d7def5;
      border-radius: 14px;
      padding: 16px;
      font-size: 15px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #commentInput:focus {
      border-color: #4a6cf7;
      box-shadow: 0 0 0 4px rgba(74, 108, 247, 0.1);
    }

    .comment-submit-wrap {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }

    #commentSubmitBtn {
      background: linear-gradient(135deg, #4a6cf7, #5e7bff);
      color: #fff;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(74, 108, 247, 0.2);
      transition: 0.2s;
    }

    #commentSubmitBtn:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, #3d5fe8, #5574ff);
    }

    .comment-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .comment-item {
      background: #fff;
      border: 1px solid #e8ecf7;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.03);
    }

    .comment-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .comment-author {
      font-size: 15px;
      font-weight: 800;
      color: #1d2233;
    }

    .comment-date {
      font-size: 13px;
      color: #7c8396;
    }

    .comment-content {
      white-space: pre-wrap;
      line-height: 1.7;
      color: #333;
      font-size: 15px;
    }

    .comment-empty {
      text-align: center;
      color: #7c8396;
      padding: 22px 12px;
      background: #f8faff;
      border: 1px dashed #dce3f8;
      border-radius: 16px;
      font-size: 15px;
    }

    .hidden {
      display: none !important;
    }

    .message-box {
      text-align: center;
      background: #fff;
      padding: 50px 20px;
      border-radius: 22px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 14px;
      }

      .detail-title {
        font-size: 30px;
      }

      .detail-card {
        padding: 24px;
        border-radius: 22px;
      }

      .meta {
        font-size: 14px;
        gap: 10px;
      }

      .comment-section h3 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container navbar">
      <div class="logo">Study Spot</div>
      <nav>
        <ul class="nav-menu">
          <li><a href="index.html">홈</a></li>
          <li><a href="mypage.html">마이페이지</a></li>
          <li><a href="community.html">커뮤니티</a></li>
          <li><span id="userName"></span></li>
          <li><a href="login.html" class="nav-btn" id="loginBtn">로그인</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="detail-section">
    <div class="container">
      <div id="loadingBox" class="message-box">게시글을 불러오는 중입니다...</div>

      <div id="errorBox" class="message-box hidden">
        게시글을 찾을 수 없습니다.
      </div>

      <div id="detailCard" class="detail-card hidden">
        <div id="tagArea"></div>

        <h1 class="detail-title" id="postTitle">제목</h1>

        <div class="meta">
          <span id="postAuthor">작성자: -</span>
          <span id="postDate">작성일: -</span>
          <span id="postViews">조회수: 0</span>
          <span id="postComments">댓글: 0개</span>
        </div>

        <div id="studyBox" class="study-box hidden">
          <h3>스터디 모집 정보</h3>
          <div class="study-grid">
            <div class="study-item">
              <h4>지점</h4>
              <p id="studyPlace">-</p>
            </div>
            <div class="study-item">
              <h4>일정</h4>
              <p id="studySchedule">-</p>
            </div>
            <div class="study-item">
              <h4>인원</h4>
              <p id="studyMembers">-</p>
            </div>
            <div class="study-item">
              <h4>상태</h4>
              <p id="studyStatus">-</p>
            </div>
          </div>
        </div>

        <div id="applicationBox" class="study-box hidden">
          <h3>신청자 목록</h3>
          <div id="applicationList"></div>
        </div>

        <div class="detail-content" id="postContent"></div>

        <div class="button-group">
          <a href="community.html" class="sub-btn">목록으로</a>
          <button type="button" class="primary-btn hidden" id="editBtn">수정</button>
          <button type="button" class="danger-btn hidden" id="deleteBtn">삭제</button>
        </div>

        <section class="comment-section">
          <h3>댓글</h3>

          <div class="comment-write-box">
            <textarea id="commentInput" placeholder="댓글을 입력하세요"></textarea>
            <div class="comment-submit-wrap">
              <button id="commentSubmitBtn" type="button">댓글 등록</button>
            </div>
          </div>

          <div id="commentList" class="comment-list"></div>
          <p id="commentEmptyMessage" class="comment-empty">아직 댓글이 없습니다.</p>
        </section>
      </div>
    </div>
  </section>

  <script type="module" src="./community-detail.js"></script>
</body>
</html>
