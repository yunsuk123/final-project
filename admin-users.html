<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>회원 관리 | Study Spot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #222;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .admin-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 270px;
      background: #1f2430;
      color: #fff;
      padding: 30px 20px;
    }

    .sidebar h1 {
      font-size: 30px;
      color: #6f86ff;
      margin-bottom: 24px;
    }

    .admin-badge {
      background: rgba(255, 255, 255, 0.08);
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 14px;
      line-height: 1.6;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu a {
      display: block;
      width: 100%;
    }

    .menu button {
      width: 100%;
      border: none;
      background: #2b3142;
      color: #fff;
      padding: 15px 16px;
      border-radius: 12px;
      text-align: left;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .menu button:hover {
      background: #3a4258;
    }

    .menu button.active {
      background: #4a6cf7;
    }

    .content {
      flex: 1;
      padding: 32px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .topbar h2 {
      font-size: 34px;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .top-actions a,
    .top-actions button {
      border: none;
      background: #4a6cf7;
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .top-actions .secondary {
      background: #e9edff;
      color: #4a6cf7;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }

    .card {
      background: #fff;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    .card h3 {
      font-size: 15px;
      color: #666;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 30px;
      font-weight: 800;
      color: #4a6cf7;
    }

    .panel {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      margin-bottom: 22px;
    }

    .panel h3 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .panel p {
      color: #666;
      margin-bottom: 18px;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid #eef1f5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      min-width: 700px;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #eef1f5;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f7f9ff;
      font-weight: 800;
      color: #444;
    }

    td {
      color: #555;
    }

    .status-active {
      color: #1db954;
      font-weight: 700;
    }

    .status-stop {
      color: #ff4d4f;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .admin-layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <h1>Study Spot</h1>

      <div class="admin-badge">
        관리자 계정으로 로그인됨<br>
        아이디: <strong>admin</strong>
      </div>

      <div class="menu">
        <a href="admin.html"><button type="button">관리자 홈</button></a>
        <a href="admin-users.html"><button type="button" class="active">회원 관리</button></a>
        <a href="admin-seats.html"><button type="button">좌석 관리</button></a>
        <a href="admin-reserve.html"><button type="button">예약 관리</button></a>
        <a href="admin-pay.html"><button type="button">결제 관리</button></a>
        <a href="admin-community.html"><button type="button">커뮤니티 관리</button></a>
        <a href="admin-study.html"><button type="button">스터디 그룹 관리</button></a>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <h2>회원 관리</h2>
        <div class="top-actions">
          <a href="admin.html" class="secondary">관리자 홈</a>
          <button id="adminLogoutBtn" type="button">로그아웃</button>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="card">
          <h3>전체 회원 수</h3>
          <p id="totalUsers">불러오는 중...</p>
        </div>
        <div class="card">
          <h3>인증 완료 회원 수</h3>
          <p id="verifiedUsers">불러오는 중...</p>
        </div>
        <div class="card">
          <h3>미인증 회원 수</h3>
          <p id="unverifiedUsers">불러오는 중...</p>
        </div>
      </div>

      <div class="panel">
        <h3>최근 회원 목록</h3>
        <p>Firestore의 users 컬렉션 기준으로 표시됩니다.</p>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>이름</th>
                <th>이메일</th>
                <th>가입일</th>
                <th>인증 상태</th>
              </tr>
            </thead>
            <tbody id="userTableBody">
              <tr>
                <td colspan="4">불러오는 중...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { db } from "./firebase.js";
    import {
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    if (sessionStorage.getItem("isAdmin") !== "true") {
      alert("관리자만 접근할 수 있습니다.");
      location.href = "login.html";
    }

    const totalUsersEl = document.getElementById("totalUsers");
    const verifiedUsersEl = document.getElementById("verifiedUsers");
    const unverifiedUsersEl = document.getElementById("unverifiedUsers");
    const userTableBody = document.getElementById("userTableBody");

    function formatDate(timestamp) {
      if (!timestamp) return "-";

      if (timestamp.seconds) {
        const date = new Date(timestamp.seconds * 1000);
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
      }

      return "-";
    }

    async function loadUsers() {
      try {
        const usersRef = collection(db, "users");
        const snapshot = await getDocs(usersRef);

        let totalUsers = 0;
        let verifiedUsers = 0;
        let unverifiedUsers = 0;
        let html = "";

        if (snapshot.empty) {
          totalUsersEl.textContent = "0";
          verifiedUsersEl.textContent = "0";
          unverifiedUsersEl.textContent = "0";
          userTableBody.innerHTML = "<tr><td colspan='4'>회원 데이터가 없습니다.</td></tr>";
          return;
        }

        snapshot.forEach((docSnap) => {
          const data = docSnap.data();

          totalUsers++;

          if (data.emailVerified === true) {
            verifiedUsers++;
          } else {
            unverifiedUsers++;
          }

          html += `
            <tr>
              <td>${data.name || "-"}</td>
              <td>${data.email || "-"}</td>
              <td>${formatDate(data.createdAt)}</td>
              <td class="${data.emailVerified ? "status-active" : "status-stop"}">
                ${data.emailVerified ? "인증 완료" : "미인증"}
              </td>
            </tr>
          `;
        });

        totalUsersEl.textContent = String(totalUsers);
        verifiedUsersEl.textContent = String(verifiedUsers);
        unverifiedUsersEl.textContent = String(unverifiedUsers);
        userTableBody.innerHTML = html;
      } catch (error) {
        console.error("회원 목록 불러오기 실패:", error);
        totalUsersEl.textContent = "오류";
        verifiedUsersEl.textContent = "오류";
        unverifiedUsersEl.textContent = "오류";
        userTableBody.innerHTML = "<tr><td colspan='4'>회원 정보를 불러오지 못했습니다.</td></tr>";
      }
    }

    document.getElementById("adminLogoutBtn").addEventListener("click", () => {
      sessionStorage.removeItem("isAdmin");
      alert("관리자 로그아웃 되었습니다.");
      location.href = "login.html";
    });

    loadUsers();
  </script>
</body>
</html>
