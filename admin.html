<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>관리자 페이지 | Study Spot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #222;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .admin-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 270px;
      background: #1f2430;
      color: #fff;
      padding: 30px 20px;
    }

    .sidebar h1 {
      font-size: 30px;
      color: #6f86ff;
      margin-bottom: 24px;
    }

    .admin-badge {
      background: rgba(255, 255, 255, 0.08);
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 14px;
      line-height: 1.6;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu a {
      display: block;
      width: 100%;
    }

    .menu button {
      width: 100%;
      border: none;
      background: #2b3142;
      color: #fff;
      padding: 15px 16px;
      border-radius: 12px;
      text-align: left;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .menu button:hover {
      background: #3a4258;
    }

    .menu button.active {
      background: #4a6cf7;
    }

    .content {
      flex: 1;
      padding: 32px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .topbar h2 {
      font-size: 34px;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .top-actions a,
    .top-actions button {
      border: none;
      background: #4a6cf7;
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .top-actions .secondary {
      background: #e9edff;
      color: #4a6cf7;
    }

    .welcome-box {
      background: #fff;
      border-radius: 20px;
      padding: 80px 40px;
      min-height: 520px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .welcome-box h3 {
      font-size: 42px;
      margin-bottom: 18px;
      color: #1f2430;
    }

    .welcome-box p {
      color: #666;
      font-size: 20px;
      line-height: 1.8;
    }

    @media (max-width: 900px) {
      .admin-layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .welcome-box {
        padding: 60px 24px;
        min-height: 400px;
      }

      .welcome-box h3 {
        font-size: 32px;
      }

      .welcome-box p {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <h1>Study Spot</h1>

      <div class="admin-badge">
        관리자 계정으로 로그인됨<br>
        아이디: <strong>admin</strong>
      </div>

      <div class="menu">
        <a href="admin-users.html"><button type="button">회원 관리</button></a>
        <a href="admin-seats.html"><button type="button">좌석 관리</button></a>
        <a href="admin-reserve.html"><button type="button">예약 관리</button></a>
        <a href="admin-pay.html"><button type="button">결제 관리</button></a>
        <a href="admin-community.html"><button type="button">커뮤니티 관리</button></a>
        <a href="admin-study.html"><button type="button">스터디 그룹 관리</button></a>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <h2>관리자 페이지</h2>
        <div class="top-actions">
          <a href="index.html" class="secondary">메인으로 이동</a>
          <button id="adminLogoutBtn" type="button">로그아웃</button>
        </div>
      </div>

      <div class="welcome-box">
        <div>
          <h3>관리자 페이지입니다</h3>
          <p>
            Study Spot 관리자 페이지에 오신 것을 환영합니다.<br>
            왼쪽 메뉴를 눌러 회원, 좌석, 예약, 결제, 커뮤니티, 스터디 그룹을 관리하세요.
          </p>
        </div>
      </div>
    </main>
  </div>

  <script>
    if (sessionStorage.getItem("isAdmin") !== "true") {
      alert("관리자만 접근할 수 있습니다.");
      location.href = "login.html";
    }

    document.getElementById("adminLogoutBtn").addEventListener("click", () => {
      sessionStorage.removeItem("isAdmin");
      alert("관리자 로그아웃 되었습니다.");
      location.href = "login.html";
    });
  </script>
</body>
</html>
