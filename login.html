<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 | Study Cafe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #eef2ff, #f8fbff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      width: 100%;
      max-width: 430px;
      background: #fff;
      padding: 40px 32px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(74, 108, 247, 0.12);
    }

    .login-container h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #4a6cf7;
      font-size: 32px;
      font-weight: 800;
    }

    .login-container .sub-title {
      text-align: center;
      color: #666;
      margin-bottom: 24px;
      font-size: 15px;
    }

    .tab-wrap {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #d9dff5;
    }

    .tab-btn {
      width: 50%;
      padding: 14px 0;
      border: none;
      background: #f5f7ff;
      color: #555;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .tab-btn.active {
      background: #4a6cf7;
      color: #fff;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid #d9dff5;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }

    .form-group input:focus {
      border-color: #4a6cf7;
    }

    .login-btn,
    .verify-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #4a6cf7;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }

    .login-btn:hover,
    .verify-btn:hover {
      background: #3655d6;
    }

    .verify-btn {
      background: #6c7cff;
    }

    .verify-btn:hover {
      background: #5868f0;
    }

    .bottom-links {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }

    .bottom-links a {
      color: #4a6cf7;
      font-weight: 700;
      text-decoration: none;
      margin-left: 4px;
    }

    .home-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      color: #888;
      font-size: 14px;
      text-decoration: none;
    }

    .home-link:hover {
      color: #4a6cf7;
    }

    .message {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      color: #444;
      line-height: 1.5;
      min-height: 22px;
    }

    .admin-guide {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      background: #f7f9ff;
      color: #666;
      font-size: 13px;
      line-height: 1.5;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Study Cafe</h1>
    <p class="sub-title" id="loginTitle">스터디카페 일반 회원 로그인</p>

    <div class="tab-wrap">
      <button type="button" class="tab-btn active" id="userTab">일반 회원</button>
      <button type="button" class="tab-btn" id="adminTab">관리자</button>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email" id="idLabel">이메일</label>
        <input type="text" id="email" placeholder="이메일을 입력하세요" required />
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" required />
      </div>

      <button type="submit" class="login-btn">로그인</button>
      <button type="button" id="resendBtn" class="verify-btn">인증 메일 다시 보내기</button>
    </form>

    <div class="admin-guide" id="adminGuide">
      관리자 테스트 계정<br>
      아이디: admin / 비밀번호: 1234
    </div>

    <div id="message" class="message"></div>

    <div class="bottom-links" id="signupArea">
      계정이 없으신가요?
      <a href="signup.html">회원가입</a>
    </div>

    <a href="index.html" class="home-link">메인으로 돌아가기</a>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
